const copyToClipboardFallback = (text) => {
const textArea = document.createElement("textarea");
textArea.value = text;
textArea.style.position = "fixed";
textArea.style.opacity = "0";
document.body.appendChild(textArea);
textArea.focus();
textArea.select();
try { document.execCommand('copy'); } catch (err) {}
document.body.removeChild(textArea);
};

const getBrowserData = () => {
    const ua = navigator.userAgent;
    if (/Brave/i.test(ua) || (navigator.brave && navigator.brave.isBrave)) return { name: 'Brave', id: 'brave' };
    if (/Edg/i.test(ua)) return { name: 'Edge', id: 'edge' };
    if (/Firefox|FxiOS/i.test(ua)) return { name: 'Firefox', id: 'firefox' };
    if (/Chrome|CriOS/i.test(ua)) return { name: 'Chrome', id: 'chrome' };
    if (/Safari/i.test(ua)) return { name: 'Safari', id: 'safari' };
    return { name: null, id: null };
};

const renderBrowserIcon = (id, className) => {
    switch(id) {

        case 'brave': return <BraveLogoSVG className={className} />;

    }
};

function App() {
const lang = 'fr'; 
const [showSplash, setShowSplash] = useState(true);
const [splashStep, setSplashStep] = useState(0);

const [user, setUser] = useState(null);
const [isAllowedBrowser, setIsAllowedBrowser] = useState(true);
const [hasSkippedBrowserWall, setHasSkippedBrowserWall] = useState(false);
const [userName, setUserName] = useState('');
const [userEmail, setUserEmail] = useState('');
const [accessKey, setAccessKey] = useState('');
const [authError, setAuthError] = useState('');
const [isLoadingAuth, setIsLoadingAuth] = useState(false);
const [isLoggingIn, setIsLoggingIn] = useState(false);
const [isScrolled, setIsScrolled] = useState(false);
const [toasts, setToasts] = useState([]);

const [currentCategory, setCurrentCategory] = useState('home');
const [searchQuery, setSearchQuery] = useState('');
const [searchResults, setSearchResults] = useState([]);
const [heroMovie, setHeroMovie] = useState(null);
const [pageSeed, setPageSeed] = useState(1);

const [selectedMovie, setSelectedMovie] = useState(null);
const [modalMode, setModalMode] = useState('info');
const [showSettings, setShowSettings] = useState(false);
const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

const [watchlist, setWatchlist] = useState([]);
const [watchlistData, setWatchlistData] = useState([]);
const [recentlyViewed, setRecentlyViewed] = useState([]);

const t = i18n['fr'];
const defaultUserName = userName || t.defaultUser;

useEffect(() => {
const userAgent = navigator.userAgent || navigator.vendor || window.opera;
const isOpera = /OPR|OPT|OPiOS|Opera|Opera Mini/i.test(userAgent) || (!!window.opera);
setIsAllowedBrowser(isOpera);

signInAnonymously(auth).catch(console.error);

const savedKey = localStorage.getItem('levelanime_saved_key');
const savedUid = localStorage.getItem('levelanime_user_uid');
if (savedKey && savedUid) {
setUser({ uid: savedUid });
setUserName(localStorage.getItem('levelanime_user_name') || '');
setUserEmail(localStorage.getItem('levelanime_user_email') || '');
}

const t1 = setTimeout(() => setSplashStep(1), 200);
const t2 = setTimeout(() => setSplashStep(2), 1400);
const t3 = setTimeout(() => setSplashStep(3), 2800);
const t4 = setTimeout(() => { setSplashStep(4); setShowSplash(false); }, 3200);
const handleScroll = () => setIsScrolled(window.scrollY > 30);
window.addEventListener('scroll', handleScroll);

return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); window.removeEventListener('scroll', handleScroll); }
}, []);

useEffect(() => {
if (!user) return;
const localData = JSON.parse(localStorage.getItem('levelanime_watchlist_' + user.uid) || '[]');
if (localData.length > 0) {
setWatchlistData(localData); setWatchlist(localData.map(m => m.id));
}

const fetchUserData = async () => {
try {
const q = collection(db, "artifacts", APP_ID, "users", user.uid, "watchlist");
const snaps = await getDocs(q);
const data = []; snaps.forEach(doc => data.push(doc.data()));
if (data.length > 0) {
setWatchlist(data.map(m => m.id)); setWatchlistData(data);
localStorage.setItem('levelanime_watchlist_' + user.uid, JSON.stringify(data));
}
const histSnap = await getDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "history", "recent"));
if (histSnap.exists() && histSnap.data().items) setRecentlyViewed(histSnap.data().items);
} catch (e) { console.error(e); }
};
fetchUserData();
}, [user]);

const showToast = useCallback((msg, type = 'info') => {
if(type === 'info') return;
const id = Date.now() + Math.random();
setToasts(prev => [...prev, { id, msg, type }]);
setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
}, []);

const formatAccessKey = (val) => {
let formatted = val.toUpperCase().replace(/[^A-Z0-9-]/g, '');
setAccessKey(formatted.substring(0, 16));
};

const handleLogin = async () => {
if (!accessKey) return;
setIsLoadingAuth(true); setAuthError('');
try {
const q = collectionGroup(db, 'security');
const querySnapshot = await getDocs(q);
let foundUserData = null;
querySnapshot.forEach(docSnap => { if (docSnap.data().key === accessKey) foundUserData = docSnap.data(); });

if (foundUserData) {
const email = foundUserData.owner || "email@inconnu.com";
const name = foundUserData.name || email.split('@')[0] || t.defaultUser;
const uid = foundUserData.uid || accessKey;
setIsLoggingIn(true);
setTimeout(() => {
setUser({ uid }); setUserName(name); setUserEmail(email);
localStorage.setItem('levelanime_saved_key', accessKey);
localStorage.setItem('levelanime_user_name', name);
localStorage.setItem('levelanime_user_email', email);
localStorage.setItem('levelanime_user_uid', uid);
showToast(t.loginSuccess, 'success'); setIsLoggingIn(false);
}, 3000);
} else { setAuthError(t.enterKey || "Clé invalide."); }
} catch (error) { setAuthError("Erreur serveur Firebase."); }
setIsLoadingAuth(false);
};

const handleLogout = () => { localStorage.clear(); setUser(null); setAccessKey(''); setShowSettings(false); setShowLogoutConfirm(false); setHasSkippedBrowserWall(false); };

useEffect(() => {
if (searchQuery.trim() === '') { setSearchResults([]); return; }
const delayDebounceFn = setTimeout(async () => {
try {
const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&language=fr-FR&query=${encodeURIComponent(searchQuery)}`);
const data = await res.json();
// Filtre Strict Anime
const animes = data.results?.filter(m => (m.media_type === 'tv' || m.media_type === 'movie') && m.original_language === 'ja' && m.genre_ids?.includes(16)) || [];
setSearchResults(animes);
} catch (e) {}
}, 500);
return () => clearTimeout(delayDebounceFn);
}, [searchQuery]);

const toggleWatchlist = async (movie) => {
if (!user) return;
const isAdded = watchlist.includes(movie.id);
let newList;
if (isAdded) {
newList = watchlistData.filter(m => m.id !== movie.id);
showToast(t.removedList, "success");
} else {
const dataObj = { id: movie.id, title: movie.title || movie.name || movie.original_name, poster_path: movie.poster_path, backdrop_path: movie.backdrop_path, vote_average: movie.vote_average, first_air_date: movie.first_air_date || null, release_date: movie.release_date || null, media_type: movie.first_air_date ? 'tv' : 'movie', addedAt: Date.now() };
newList = [...watchlistData, dataObj];
showToast(t.addedList, "success");
}
setWatchlistData(newList); setWatchlist(newList.map(m => m.id));
localStorage.setItem('levelanime_watchlist_' + user.uid, JSON.stringify(newList));
try {
const ref = doc(db, "artifacts", APP_ID, "users", user.uid, "watchlist", movie.id.toString());
if (isAdded) await deleteDoc(ref); else await setDoc(ref, newList.find(m => m.id === movie.id));
} catch(e) {}
};

const addToHistory = async (movie) => {
if (!user) return;
const dataObj = { id: movie.id, title: movie.title || movie.name || movie.original_name, poster_path: movie.poster_path, backdrop_path: movie.backdrop_path, vote_average: movie.vote_average, media_type: movie.first_air_date ? 'tv' : 'movie', viewedAt: Date.now() };
const updatedHistory = [dataObj, ...recentlyViewed.filter(m => m.id !== movie.id)].slice(0, 15);
setRecentlyViewed(updatedHistory);
try { await setDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "history", "recent"), { items: updatedHistory }); } catch(e) {}
};

const openModal = (movie, mode = 'info') => { setSelectedMovie(movie); setModalMode(mode); addToHistory(movie); };

const handleNavCategory = (cat) => {
if (currentCategory === cat && (cat === 'home' || cat === 'movie' || cat === 'tv')) setPageSeed(Math.floor(Math.random() * 5) + 1);
else setPageSeed(1);
setCurrentCategory(cat); setSearchQuery(''); window.scrollTo({ top: 0, behavior: 'smooth' });
};

// --- CONSTRUCTION DES URLS TMDB CORRECTE (Évite les bugs de listes vides) ---
const buildAnimeUrl = (path, extraParams = '') => {
    let base = `${path}?api_key=${API_KEY}&language=fr-FR&with_original_language=ja`;
    if (!extraParams.includes('with_genres')) {
        base += '&with_genres=16';
    }
    return base + extraParams;
};

const rowsConfig = [];
if (currentCategory === 'home' || currentCategory === 'tv') {

function Banner({ url, onPlay, onInfo, setHero, heroMovie, t, pageSeed, COLOR_BRAND }) {
useEffect(() => {
const fetchMovie = async () => {
try {
const req1 = fetch(`${BASE_URL}${url}&page=${pageSeed}`);
const req2 = fetch(`${BASE_URL}${url}&page=${pageSeed + 1}`);
const [res1, res2] = await Promise.all([req1, req2]);
const data1 = await res1.json(); const data2 = await res2.json();
const combined = [...(data1.results||[]), ...(data2.results||[])];
const valids = combined.filter(m => m.backdrop_path);
setHero(valids[Math.floor(Math.random() * valids.length)]);
} catch(e) {}
};
fetchMovie();
}, [url, pageSeed]);

// --- ROW COMPONENT ---
function Row({ title, fetchUrl, isLarge, shuffle, onMovieClick, pageSeed, COLOR_BRAND }) {
const [movies, setMovies] = useState([]);
const rowRef = useRef(null);

useEffect(() => {
const fetchM = async () => {
try {
const reqs = [];
for (let i = 0; i < 2; i++) reqs.push(fetch(`${BASE_URL}${fetchUrl}&page=${pageSeed + i}`));
const responses = await Promise.all(reqs);
const dataPromises = responses.map(r => r.json());
const allData = await Promise.all(dataPromises);

let combined = [];
allData.forEach(d => { if(d.results) combined = [...combined, ...d.results]; });
let uniqueMovies = Array.from(new Set(combined.map(a => a.id))).map(id => combined.find(a => a.id === id)).filter(m => m && m.poster_path);
if (shuffle) uniqueMovies = uniqueMovies.sort(() => Math.random() - 0.5);
setMovies(uniqueMovies.slice(0, 30));
} catch(e) {}
};
fetchM();
}, [fetchUrl, pageSeed, shuffle]);

let isDown = false; let startX; let scrollLeft;
const handleMouseDown = (e) => { isDown = true; startX = e.pageX - rowRef.current.offsetLeft; scrollLeft = rowRef.current.scrollLeft; };
const handleMouseLeave = () => { isDown = false; }; const handleMouseUp = () => { isDown = false; };
const handleMouseMove = (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - rowRef.current.offsetLeft; const walk = (x - startX) * 2; rowRef.current.scrollLeft = scrollLeft - walk; };
const scrollAction = (direction) => { const scrollAmt = 400; if (rowRef.current) rowRef.current.scrollBy({ left: direction === 'left' ? -scrollAmt : scrollAmt, behavior: 'smooth' }); }

if (movies.length === 0) return null;

return (
<div className="group relative ml-4 md:ml-12 animate-in fade-in duration-700">
<h2 className={`text-white/90 text-[13px] md:text-lg font-black mb-3 md:mb-5 uppercase tracking-[0.2em] border-l-4 border-[${COLOR_BRAND}] pl-3 md:pl-4 drop-shadow-sm flex items-center gap-3`}>
{title} <ChevronRight className="w-4 h-4 text-white/30" />
</h2>
<div onClick={() => scrollAction('left')} className="absolute left-0 top-12 bottom-0 z-40 w-10 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-start cursor-pointer transition-opacity duration-300 -ml-4 md:-ml-12 hidden md:flex"><ChevronLeft className={`text-white hover:text-[${COLOR_BRAND}] transition-colors w-10 h-10 ml-1 drop-shadow-lg`} /></div>
<div ref={rowRef} onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeave} onMouseUp={handleMouseUp} onMouseMove={handleMouseMove} className="flex overflow-y-hidden overflow-x-scroll py-2 md:py-4 space-x-3 md:space-x-5 no-scrollbar pr-8 cursor-grab active:cursor-grabbing">
{movies.map(movie => {
const imgClass = isLarge ? 'w-[140px] md:w-[200px] h-[210px] md:h-[300px]' : 'w-[200px] md:w-[260px] h-[112px] md:h-[146px]';
const imgSrc = `${IMAGE_BASE_URL}${isLarge ? movie.poster_path : (movie.backdrop_path || movie.poster_path)}`;
return (
<div key={movie.id} className="relative flex-none movie-card-hover cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520]" onClick={() => onMovieClick(movie)}>
<img className={`object-cover ${imgClass} transition-opacity duration-500`} src={imgSrc} loading="lazy" alt="" draggable="false"/>
<div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 md:p-4 pointer-events-none">
<p className="text-white font-black text-[10px] md:text-sm uppercase tracking-wider truncate drop-shadow-md">{movie.title || movie.name}</p>
<div className="flex items-center gap-2 mt-1 md:mt-2"><span className={`text-[${COLOR_BRAND}] font-bold text-[9px] md:text-[10px]`}><Star className="w-3 h-3 inline mb-0.5" /> {movie.vote_average?.toFixed(1)}</span></div>
</div>
</div>
)
})}
</div>
<div onClick={() => scrollAction('right')} className="absolute right-0 top-12 bottom-0 z-40 w-12 bg-gradient-to-l from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-end cursor-pointer transition-opacity duration-300 hidden md:flex"><ChevronRight className={`text-white hover:text-[${COLOR_BRAND}] transition-colors w-10 h-10 mr-2 drop-shadow-lg`} /></div>
</div>
)
}

    )}
</div>

<a href={externalSearchUrl} target="_blank" rel="noreferrer" className={`ml-auto px-4 py-3 rounded-xl text-[11px] font-bold uppercase transition-all bg-white/5 text-white border border-white/20 hover:bg-white/10 flex items-center gap-2 no-underline h-[46px]`}>
<ExternalLink className={`w-4 h-4 text-[${COLOR_BRAND}]`} /> <span className="hidden sm:inline">{t.externalSearchBtn}</span><span className="sm:hidden">Recherche</span>
</a>
</div>

{/* UI DES ÉPISODES FIABLE */}
{isTV && (
<div className="mt-8 pt-6 border-t border-white/10">
    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
        <h4 className="font-black text-white uppercase tracking-widest text-xs flex items-center gap-2">
            <ListVideo className={`w-4 h-4 text-[${COLOR_BRAND}]`} /> {t.episodesList}
        </h4>

        <div className="flex items-center gap-3">
            <div className="flex bg-[#151520] border border-white/20 rounded-lg p-0.5">
                <button onClick={() => setAudioLang('vostfr')} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md transition-colors ${audioLang === 'vostfr' ? `bg-[${DROPDOWN_RED}] text-white` : 'text-white/50 hover:text-white'}`}>VOSTFR</button>
                <button onClick={() => setAudioLang('vf')} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md transition-colors ${audioLang === 'vf' ? `bg-[${DROPDOWN_RED}] text-white` : 'text-white/50 hover:text-white'}`}>VF</button>
            </div>

            {details?.seasons && (
                <select value={selectedSeason} onChange={(e) => setSelectedSeason(Number(e.target.value))} className="bg-[#151520] border border-white/20 text-white text-xs font-bold px-3 py-1.5 rounded-lg outline-none cursor-pointer">
                    {details.seasons.filter(s => s.season_number > 0).map(s => (
                        <option key={s.id} value={s.season_number}>{t.season} {s.season_number}</option>
                    ))}
                </select>
            )}
        </div>
    </div>
    
    {episodesLoading ? (
        <div className="text-white/40 text-xs py-4 text-center">Chargement des épisodes...</div>
    ) : seasonDetails?.episodes ? (
        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
            {seasonDetails.episodes.map(ep => (
                <button key={ep.id} onClick={() => playSpecificEpisode(ep.episode_number)} className={`py-2 px-1 rounded-lg text-xs font-bold border transition-all ${selectedEpisode === ep.episode_number ? `bg-[${DROPDOWN_RED}] border-[${DROPDOWN_RED}] text-white` : 'bg-[#18181b] border-white/10 text-white/70 hover:bg-white/10'}`}>
                    EP {ep.episode_number}
                </button>
            ))}
        </div>
    ) : (
        <div className="text-white/40 text-xs py-4 text-center col-span-full">Épisodes non disponibles.</div>
    )}
</div>
)}

</div>
)}

{(modalMode === 'info' || modalMode === 'trailer') && details && (
<div className="flex flex-col lg:flex-row gap-8 lg:gap-12">
<div className="flex-1">
<h2 className="text-3xl md:text-5xl font-black mb-2 text-white uppercase tracking-tighter drop-shadow-lg leading-tight">{movie.title || movie.name || movie.original_name}</h2>

<div className="flex items-center space-x-3 mb-6 flex-wrap gap-y-3">
{details.status && <span className="text-blue-400 font-bold text-[10px] md:text-[11px] uppercase tracking-widest border border-blue-400/30 px-2 py-1 rounded bg-blue-400/10">{details.status}</span>}
<span className="text-white/80 font-bold text-[12px] md:text-[13px] border-l border-white/20 pl-3">{(movie.release_date || movie.first_air_date || '').substring(0, 4)}</span>
{details.original_language && <span className="text-white/60 font-bold text-[11px] uppercase tracking-widest border-l border-white/20 pl-3">VO : {details.original_language.toUpperCase()}</span>}
<span className="px-2 py-1 border border-white/20 rounded text-[10px] font-bold text-white uppercase tracking-widest bg-white/5 shadow-sm border-l border-white/20 pl-3 ml-2">HD</span>
</div>

<div className="mb-4">
<span className="text-white/40 font-bold text-[10px] uppercase tracking-widest block mb-1">{t.originalTitle}</span>
<span className="text-white/70 font-medium text-[12px] italic">{details.original_title || details.original_name || t.notSpecified}</span>
</div>

<div className="flex flex-wrap gap-3 mb-6">
<button onClick={() => handlePlayRequest(selectedServer)} className={`flex-1 sm:flex-none items-center justify-center flex gap-2 px-8 py-3.5 bg-[${DROPDOWN_RED}] text-white rounded-xl text-[11px] md:text-[13px] font-black uppercase tracking-widest hover:opacity-90 shadow-[0_0_20px_rgba(229,27,50,0.4)]`}>
<Play className="w-4 h-4 fill-white" /> <span>{isTV ? t.playEpisode : t.playMovie}</span>
</button>

<button onClick={() => { if (modalMode !== 'trailer') { setIframeLoading(true); setModalMode('trailer'); } }} disabled={modalMode === 'trailer'} className={`flex-1 sm:flex-none items-center justify-center flex gap-2 px-6 py-3.5 rounded-xl text-[11px] md:text-[13px] font-black uppercase tracking-widest transition-all ${modalMode === 'trailer' ? `bg-[${COLOR_BRAND}]/10 border border-[${COLOR_BRAND}]/50 text-[${COLOR_BRAND}]` : 'bg-white/5 border border-white/20 text-white hover:bg-white/10'}`}>
{modalMode === 'trailer' ? <span>{t.trailerPlaying}</span> : <><Clapperboard className="w-4 h-4" /> <span>{t.trailer}</span></>}
</button>
</div>

<div className="markdown-pro pr-2 text-justify">
{movie.overview ? movie.overview.split('\n').filter(p=>p.trim()).map((p,i) => <p key={i} className="mb-3">{p}</p>) : <p>{t.noDesc}</p>}
</div>
</div>

<div className="w-full lg:w-[35%] space-y-6 bg-black/40 p-5 md:p-6 rounded-2xl border border-white/5 h-fit">
<div>
<span className="text-white/40 font-bold block mb-3 uppercase tracking-widest text-[10px] flex items-center gap-2"><Users className={`w-4 h-4 text-[${COLOR_BRAND}]`} /> <span>{t.cast}</span></span>
<div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
{details.credits?.cast?.slice(0, 10).map(c => (
<div key={c.id} className="flex flex-col items-center min-w-[70px] gap-1 shrink-0">
<img src={c.profile_path ? `https://image.tmdb.org/t/p/w185${c.profile_path}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=151520&color=f43f5e`} className="w-12 h-12 rounded-full object-cover border border-white/10 bg-black/50" draggable="false" alt=""/>
<span className="text-[9px] text-white/90 text-center font-bold w-[80px] truncate">{c.name}</span>
{c.character && <span className={`text-[8px] text-[${COLOR_BRAND}] truncate w-[80px] text-center`}>{c.character}</span>}
</div>
)) || <span className="text-white/50 text-xs">{t.noCasting}</span>}
</div>
</div>
<div className="w-full h-px bg-white/10"></div>
<div>
<span className="text-white/40 font-bold block mb-1 uppercase tracking-widest text-[10px] flex items-center gap-2"><Tags className={`w-4 h-4 text-[${COLOR_BRAND}]`} /> {t.genresOrigin}</span>
<span className="text-white/90 font-bold text-[11px] uppercase tracking-widest block mt-2">
{details.genres?.map(g => <span key={g.id} className="bg-white/10 px-2 py-1 rounded inline-block mb-1 mr-1">{g.name}</span>)}
</span>
</div>
</div>
</div>
)}

{details && details.similar?.results?.length > 0 && (
<div className="mt-12 pt-8 border-t border-white/10">
<h3 className={`text-white/90 text-sm md:text-base font-black mb-5 uppercase tracking-[0.2em] border-l-4 border-[${COLOR_BRAND}] pl-3`}>{t.similar}</h3>
<div className="flex overflow-x-auto gap-4 no-scrollbar pb-4 cursor-grab">
{/* FILTRE STRICT DES SIMILAIRES (Uniquement Japonais) */}
{details.similar.results.filter(sm => sm.original_language === 'ja' && sm.genre_ids?.includes(16)).slice(0, 10).map(sm => {
if(!sm.poster_path) return null;
return (
<div key={sm.id} className="relative flex-none cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] hover:scale-105 transition-transform w-[120px] md:w-[150px] h-[180px] md:h-[225px]" onClick={() => onSelectSimilar(sm)}>
<img className="object-cover w-full h-full" src={`${IMAGE_BASE_URL}${sm.poster_path}`} loading="lazy" alt=""/>
</div>
)
})}
</div>
</div>
)}
</div>
</div>
</div>
);
}

const rootElement = document.getElementById('root');
const root = createRoot(rootElement);
root.render(<App />);
</script>
<style>
/* Style pour la scrollbar des épisodes */
.custom-scrollbar::-webkit-scrollbar { width: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(229, 27, 50, 0.5); border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(229, 27, 50, 0.8); }
</style>
</body>
</html>
