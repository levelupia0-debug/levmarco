<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariage Son & Keita</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap');

        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-20px) scale(1.05) rotate(3deg); }
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        @keyframes floatItem {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .animate-slide-up { animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-scale-in { animation: scaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }
        .animate-float-item { animation: floatItem 4s ease-in-out infinite; }
        .animate-shimmer-bg {
            background: linear-gradient(90deg, #f43f5e, #d946ef, #8b5cf6, #f43f5e);
            background-size: 300% 100%;
            animation: shimmer 5s linear infinite;
        }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-600 { animation-delay: 600ms; }
        .delay-700 { animation-delay: 700ms; }
        .delay-800 { animation-delay: 800ms; }
        .delay-900 { animation-delay: 900ms; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }
        .gradient-text {
            background: linear-gradient(to right, #db2777, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Floating hearts container */
        #floating-hearts {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .floating-heart {
            position: absolute;
            opacity: 0.3;
            color: #f43f5e;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-rose-50 via-pink-100 to-purple-100 text-slate-800 relative pb-24">

    <!-- Cœurs flottants en arrière-plan -->
    <div id="floating-hearts"></div>

    <!-- En-tête de l'application -->
    <header class="pt-8 pb-6 px-4 text-center relative z-10 animate-slide-up">
        <div class="inline-block p-3 rounded-full bg-white/70 backdrop-blur-md shadow-lg mb-3 animate-float-item border border-white">
            <i data-lucide="heart" class="text-rose-500 animate-heartbeat w-8 h-8 fill-[#f43f5e]"></i>
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-2 font-serif animate-slide-up delay-100">
            <span class="gradient-text">Son & Keita</span>
        </h1>
        <p class="text-lg md:text-xl text-rose-700/80 font-medium tracking-wide uppercase animate-slide-up delay-200">
            Just Married • Pour Toujours
        </p>
    </header>

    <!-- Contenu principal qui change dynamiquement -->
    <main id="app-content" class="max-w-4xl mx-auto px-4 relative z-10 min-h-[60vh] transition-all duration-500 ease-in-out">
        <!-- Le contenu est injecté ici via JavaScript -->
    </main>

    <!-- Barre de navigation -->
    <nav class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/40 z-50 px-4 py-3 md:py-4 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-between items-center" id="nav-buttons">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 bg-gradient-to-tr from-rose-400 to-purple-500 text-white shadow-lg transform -translate-y-2">
                <div class="animate-bounce"><i data-lucide="heart" class="w-6 h-6"></i></div>
                <span class="text-[10px] mt-1 font-medium opacity-100">Accueil</span>
            </button>
            <button onclick="switchTab('gallery')" id="nav-gallery" class="nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60 hover:text-rose-500">
                <div><i data-lucide="image" class="w-5 h-5"></i></div>
                <span class="text-[10px] mt-1 font-medium opacity-80">Galerie</span>
            </button>
            <button onclick="switchTab('quiz')" id="nav-quiz" class="nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60 hover:text-rose-500">
                <div><i data-lucide="party-popper" class="w-5 h-5"></i></div>
                <span class="text-[10px] mt-1 font-medium opacity-80">Quiz</span>
            </button>
            <button onclick="switchTab('guestbook')" id="nav-guestbook" class="nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60 hover:text-rose-500">
                <div><i data-lucide="book-heart" class="w-5 h-5"></i></div>
                <span class="text-[10px] mt-1 font-medium opacity-80">Livre d'Or</span>
            </button>
        </div>
    </nav>

    <!-- SCRIPTS JAVASCRIPT -->
    <script>
        // --- 1. INITIALISATION DES CŒURS FLOTTANTS ---
        function initFloatingHearts() {
            const container = document.getElementById('floating-hearts');
            for(let i=0; i<15; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.style.left = `${Math.random() * 100}%`;
                heart.style.top = `${Math.random() * 100}%`;
                heart.style.animation = `float ${5 + Math.random() * 5}s infinite ease-in-out`;
                heart.style.animationDelay = `${Math.random() * 5}s`;
                heart.style.transform = `scale(${0.5 + Math.random()})`;
                heart.innerHTML = `<i data-lucide="heart" fill="#f43f5e" class="w-6 h-6"></i>`;
                container.appendChild(heart);
            }
        }

        // --- 2. GESTION DES ONGLETS (NAVIGATION) ---
        let currentTab = 'home';
        
        function switchTab(tabId) {
            currentTab = tabId;
            
            // Mise à jour des styles des boutons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const iconDiv = btn.querySelector('div');
                const icon = btn.querySelector('i');
                const span = btn.querySelector('span');
                
                if (btn.id === `nav-${tabId}`) {
                    btn.className = 'nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 bg-gradient-to-tr from-rose-400 to-purple-500 text-white shadow-lg transform -translate-y-2';
                    iconDiv.className = 'animate-bounce';
                    icon.classList.replace('w-5', 'w-6');
                    icon.classList.replace('h-5', 'h-6');
                    span.className = 'text-[10px] mt-1 font-medium opacity-100';
                } else {
                    btn.className = 'nav-btn flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all duration-300 text-slate-500 hover:bg-white/60 hover:text-rose-500';
                    iconDiv.className = '';
                    icon.classList.replace('w-6', 'w-5');
                    icon.classList.replace('h-6', 'h-5');
                    span.className = 'text-[10px] mt-1 font-medium opacity-80';
                }
            });

            // Affichage du contenu
            renderContent();
        }

        // --- 3. RENDU DU CONTENU (VUES) ---
        function renderContent() {
            const container = document.getElementById('app-content');
            
            if (currentTab === 'home') container.innerHTML = getHomeHTML();
            else if (currentTab === 'gallery') container.innerHTML = getGalleryHTML();
            else if (currentTab === 'quiz') container.innerHTML = getQuizHTML();
            else if (currentTab === 'guestbook') container.innerHTML = getGuestbookHTML();

            // Rafraîchir les icônes Lucide après injection HTML
            lucide.createIcons();
        }

        // --- VUE : ACCUEIL ---
        function getHomeHTML() {
            const witnesses = ["Ariana", "Jean-Marc", "Berry", "Yvan", "Marcel"];
            let witnessesHTML = '';
            
            witnesses.forEach((name, idx) => {
                witnessesHTML += `
                    <div class="glass-panel px-6 py-4 rounded-2xl flex flex-col items-center gap-3 hover:-translate-y-2 hover:shadow-lg hover:shadow-rose-500/20 transition-all duration-300 cursor-default group animate-slide-up" style="animation-delay: ${idx * 100 + 900}ms">
                        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-rose-300 to-purple-400 flex items-center justify-center text-white font-bold text-xl shadow-inner group-hover:scale-110 transition-transform duration-300">
                            ${name.charAt(0).toUpperCase()}
                        </div>
                        <span class="font-semibold text-slate-700 group-hover:text-rose-600 transition-colors">${name}</span>
                    </div>
                `;
            });

            return `
                <div class="flex flex-col items-center pb-12">
                    <div class="w-full max-w-2xl glass-panel rounded-3xl p-8 shadow-xl text-center mb-8 relative overflow-hidden animate-slide-up delay-300 transition-transform duration-500 hover:shadow-2xl hover:-translate-y-1">
                        <div class="absolute -top-10 -right-10 text-rose-200/50 animate-pulse-slow">
                            <i data-lucide="sparkles" class="w-32 h-32"></i>
                        </div>
                        
                        <h2 class="text-3xl font-bold mb-6 text-slate-800">L'aventure commence ! 💍</h2>
                        <p class="text-lg text-slate-600 mb-8 leading-relaxed">
                            Bienvenue dans le petit univers de Son et Keita. Revivez avec nous les meilleurs moments de cette journée inoubliable, testez vos connaissances sur notre couple, et laissez-nous un mot doux pour l'avenir.
                        </p>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div class="bg-white/60 rounded-2xl p-4 shadow-sm border border-white/80 animate-slide-up delay-400 hover:bg-white hover:scale-105 hover:shadow-md transition-all duration-300">
                                <div class="text-2xl font-bold text-rose-600 mb-1">∞</div>
                                <div class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Amour</div>
                            </div>
                            <div class="bg-white/60 rounded-2xl p-4 shadow-sm border border-white/80 animate-slide-up delay-500 hover:bg-white hover:scale-105 hover:shadow-md transition-all duration-300">
                                <div class="text-2xl font-bold text-rose-600 mb-1">1</div>
                                <div class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Oui</div>
                            </div>
                            <div class="bg-white/60 rounded-2xl p-4 shadow-sm border border-white/80 animate-slide-up delay-600 hover:bg-white hover:scale-105 hover:shadow-md transition-all duration-300">
                                <div class="text-2xl font-bold text-rose-600 mb-1">2</div>
                                <div class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Alliances</div>
                            </div>
                            <div class="bg-white/60 rounded-2xl p-4 shadow-sm border border-white/80 animate-slide-up delay-700 hover:bg-white hover:scale-105 hover:shadow-md transition-all duration-300">
                                <div class="text-2xl font-bold text-rose-600 mb-1">100%</div>
                                <div class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Bonheur</div>
                            </div>
                        </div>
                    </div>

                    <div class="w-full max-w-2xl animate-scale-in delay-500 group relative">
                        <div class="absolute inset-0 bg-gradient-to-r from-rose-400 to-purple-500 rounded-3xl blur-xl opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
                        <img 
                            src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1000&q=80" 
                            alt="Mariage" 
                            class="w-full h-64 md:h-80 object-cover rounded-3xl shadow-2xl border-4 border-white/80 relative z-10 transition-transform duration-700 group-hover:scale-[1.02]"
                        />
                    </div>

                    <!-- Section des Témoins -->
                    <div class="w-full max-w-2xl mt-12 animate-slide-up delay-800">
                        <div class="flex items-center justify-center gap-3 mb-6">
                            <div class="h-px bg-gradient-to-r from-transparent to-rose-300 w-16"></div>
                            <h3 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                <i data-lucide="star" class="text-rose-400 animate-pulse w-6 h-6"></i>
                                L'Équipe de Choc
                                <i data-lucide="star" class="text-rose-400 animate-pulse w-6 h-6"></i>
                            </h3>
                            <div class="h-px bg-gradient-to-l from-transparent to-rose-300 w-16"></div>
                        </div>
                        
                        <div class="flex flex-wrap justify-center gap-4">
                            ${witnessesHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- VUE : GALERIE ---
        function getGalleryHTML() {
            const photos = [
                "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80",
                "https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=500&q=80",
                "https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?auto=format&fit=crop&w=500&q=80",
                "https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=500&q=80",
                "https://images.unsplash.com/photo-1532712938310-34cb3982ef74?auto=format&fit=crop&w=500&q=80",
                "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=500&q=80",
            ];
            
            let photosHTML = '';
            photos.forEach((src, idx) => {
                photosHTML += `
                    <div class="group relative rounded-2xl overflow-hidden aspect-square shadow-md hover:shadow-2xl hover:z-10 transition-all duration-500 animate-scale-in cursor-pointer" style="animation-delay: ${idx * 100 + 100}ms">
                        <img src="${src}" alt="Souvenir ${idx + 1}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 group-hover:rotate-1" loading="lazy" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-end justify-center pb-6">
                            <i data-lucide="heart" class="text-white transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 hover:text-rose-400 hover:scale-110 w-7 h-7" fill="currentColor"></i>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="pb-8">
                    <h2 class="text-3xl font-bold mb-8 text-center text-slate-800 flex items-center justify-center gap-3 animate-slide-up">
                        <i data-lucide="image" class="text-rose-500 animate-float-item w-8 h-8"></i> Les Souvenirs
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        ${photosHTML}
                    </div>
                    <p class="text-center text-sm text-slate-500 mt-8 italic animate-slide-up delay-600">Plus de photos à venir bientôt !</p>
                </div>
            `;
        }

        // --- VUE : QUIZ ---
        // Variables d'état du Quiz
        const quizQuestions = [
            { q: "Qui a fait le premier pas ?", options: ["Son", "Keita", "Un ami en commun"], answer: 0 },
            { q: "Quelle est leur destination de lune de miel rêvée ?", options: ["Japon", "Maldives", "New York"], answer: 1 },
            { q: "Qui est le plus têtu des deux ?", options: ["Son", "Keita", "C'est un match nul !"], answer: 2 },
            { q: "Quel est leur plat préféré à partager ?", options: ["Pizza", "Sushi", "Burger frites"], answer: 1 }
        ];
        let quizState = { currentQ: 0, score: 0, showResult: false, selected: null };

        function handleQuizAnswer(idx) {
            if (quizState.selected !== null) return; // Empêcher les clics multiples
            
            quizState.selected = idx;
            renderContent(); // Re-render pour afficher les couleurs de bonne/mauvaise réponse
            
            setTimeout(() => {
                if (idx === quizQuestions[quizState.currentQ].answer) {
                    quizState.score++;
                }
                
                if (quizState.currentQ < quizQuestions.length - 1) {
                    quizState.currentQ++;
                    quizState.selected = null;
                } else {
                    quizState.showResult = true;
                }
                renderContent(); // Re-render pour la prochaine question ou résultat
            }, 1000);
        }

        function resetQuiz() {
            quizState = { currentQ: 0, score: 0, showResult: false, selected: null };
            renderContent();
        }

        function getQuizHTML() {
            if (quizState.showResult) {
                const isPerfect = quizState.score === quizQuestions.length;
                return `
                    <div class="max-w-lg mx-auto pb-12">
                        <div class="glass-panel rounded-3xl p-8 shadow-xl relative overflow-hidden animate-slide-up">
                            <div class="text-center py-8 animate-scale-in">
                                <i data-lucide="party-popper" class="text-rose-500 mx-auto mb-6 animate-float-item w-20 h-20"></i>
                                <h3 class="text-3xl font-bold mb-4 animate-slide-up">Quiz Terminé !</h3>
                                <p class="text-xl mb-6 animate-slide-up delay-100">
                                    Votre score : <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-purple-600 text-4xl">${quizState.score}</span> / ${quizQuestions.length}
                                </p>
                                <p class="text-slate-600 mb-8 italic animate-slide-up delay-200">
                                    ${isPerfect ? "Wow ! Vous connaissez Son & Keita par cœur ! 🏆" : "Pas mal ! Mais il y a encore des choses à découvrir sur les mariés ! ✨"}
                                </p>
                                <button onclick="resetQuiz()" class="animate-shimmer-bg text-white font-bold py-4 px-10 rounded-full shadow-lg hover:shadow-rose-500/30 transform hover:-translate-y-1 active:scale-95 transition-all animate-slide-up delay-300">
                                    Rejouer
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            const q = quizQuestions[quizState.currentQ];
            let optionsHTML = '';
            
            q.options.forEach((opt, idx) => {
                let btnClass = 'bg-white/60 border-transparent hover:border-rose-300 hover:bg-white hover:shadow-md text-slate-700';
                
                if (quizState.selected === idx) {
                    if (idx === q.answer) {
                        btnClass = 'bg-green-100 border-green-500 text-green-700 shadow-[0_0_15px_rgba(34,197,94,0.3)] transform scale-[1.02]';
                    } else {
                        btnClass = 'bg-red-100 border-red-500 text-red-700 transform scale-[0.98]';
                    }
                } else if (quizState.selected !== null && idx === q.answer) {
                    // Montrer la bonne réponse même si l'utilisateur s'est trompé
                    btnClass = 'bg-green-50 border-green-300 text-green-600';
                }

                optionsHTML += `
                    <button onclick="handleQuizAnswer(${idx})" ${quizState.selected !== null ? 'disabled' : ''} class="w-full text-left p-4 rounded-xl border-2 transition-all duration-300 font-medium animate-slide-up active:scale-95 ${btnClass}" style="animation-delay: ${idx * 100 + 100}ms">
                        ${opt}
                    </button>
                `;
            });

            return `
                <div class="max-w-lg mx-auto pb-12">
                    <div class="glass-panel rounded-3xl p-8 shadow-xl relative overflow-hidden animate-slide-up">
                        <div>
                            <div class="flex justify-between items-center mb-6 text-sm font-bold text-rose-500 uppercase tracking-wider">
                                <span class="animate-pulse-slow">Question ${quizState.currentQ + 1} / ${quizQuestions.length}</span>
                                <i data-lucide="star" fill="currentColor" class="animate-float-item w-5 h-5"></i>
                            </div>
                            <h3 class="text-2xl font-bold text-slate-800 mb-8 animate-slide-up">${q.q}</h3>
                            <div class="space-y-3">
                                ${optionsHTML}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- VUE : LIVRE D'OR ---
        // État du livre d'or
        let guestbookMessages = [
            { name: "La famille", text: "Félicitations pour ce magnifique mariage ! Que votre vie soit remplie d'amour et de joie.", date: "Aujourd'hui" },
            { name: "Meilleur témoin", text: "Une journée inoubliable pour un couple en or. Je vous aime ! ❤️", date: "Hier" }
        ];

        function handleGuestbookSubmit(event) {
            event.preventDefault();
            const nameInput = document.getElementById('gb-name').value;
            const msgInput = document.getElementById('gb-msg').value;

            if (nameInput.trim() && msgInput.trim()) {
                guestbookMessages.unshift({
                    name: nameInput,
                    text: msgInput,
                    date: "À l'instant"
                });
                renderContent(); // Re-render mettra à jour la liste et videra le formulaire
            }
        }

        function getGuestbookHTML() {
            let messagesHTML = '';
            guestbookMessages.forEach((msg, idx) => {
                messagesHTML += `
                    <div class="bg-white/70 backdrop-blur-md p-5 rounded-2xl shadow-sm border border-white flex gap-4 items-start animate-slide-up hover:shadow-md transition-shadow" style="animation-delay: ${Math.min(idx * 150 + 200, 1000)}ms">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-rose-300 to-purple-300 flex items-center justify-center text-white font-bold flex-shrink-0 shadow-inner">
                            ${msg.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-baseline justify-between mb-1">
                                <h4 class="font-bold text-slate-800 text-lg">${msg.name}</h4>
                                <span class="text-xs text-slate-400 font-medium bg-white/50 px-2 py-1 rounded-full">${msg.date}</span>
                            </div>
                            <p class="text-slate-600 leading-relaxed">${msg.text}</p>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="max-w-2xl mx-auto pb-12">
                    <h2 class="text-3xl font-bold mb-8 text-center text-slate-800 flex items-center justify-center gap-3 animate-slide-up">
                        <i data-lucide="message-circle-heart" class="text-rose-500 animate-float-item w-8 h-8"></i> Livre d'Or
                    </h2>

                    <!-- Formulaire -->
                    <form onsubmit="handleGuestbookSubmit(event)" class="glass-panel p-6 rounded-3xl shadow-xl mb-10 animate-slide-up delay-100 transition-all focus-within:shadow-rose-500/10 focus-within:border-rose-300">
                        <div class="mb-4">
                            <input type="text" id="gb-name" placeholder="Votre Prénom" required
                                class="w-full p-4 bg-white/80 border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white shadow-inner transition-all" />
                        </div>
                        <div class="mb-4">
                            <textarea id="gb-msg" placeholder="Laissez un petit mot aux mariés..." rows="3" required
                                class="w-full p-4 bg-white/80 border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white shadow-inner transition-all resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full animate-shimmer-bg text-white font-bold py-4 px-6 rounded-xl shadow-md hover:shadow-lg hover:shadow-rose-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                            Envoyer mon mot <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-2 group-hover:-translate-y-1 transition-transform"></i>
                        </button>
                    </form>

                    <!-- Liste des messages -->
                    <div class="space-y-4">
                        ${messagesHTML}
                    </div>
                </div>
            `;
        }

        // --- INITIALISATION DU DOCUMENT ---
        document.addEventListener('DOMContentLoaded', () => {
            initFloatingHearts();
            renderContent(); // Rendu initial (Accueil)
        });

    </script>
</body>
</html>
