<!DOCTYPE html>
<html lang="fr">
<head>

    <!-- Polices et Icônes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #060608; 
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* Fond métallique profond */
        .bg-main { 
            background: radial-gradient(circle at 50% 0%, #15092a 0%, #060608 80%); 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(20, 20, 25, 0.4); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .holo-card { 
            background: linear-gradient(135deg, rgba(30,20,45,0.6) 0%, rgba(10,10,15,0.8) 100%); 
            border: 1px solid rgba(168,85,247,0.2); 
            box-shadow: inset 0 0 30px rgba(168,85,247,0.05), 0 30px 60px rgba(0,0,0,0.8); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Étoile métallique fixe (plus de rotation) */
        .star-metallic { 
            background: linear-gradient(135deg, #d8b4fe 0%, #a855f7 50%, #7e22ce 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(168, 85, 247, 0.4));
        }
        
        .splash-text { 
            font-size: 1.8rem; font-weight: 800; letter-spacing: 0.6em; text-transform: uppercase; 
            opacity: 0; position: absolute; transform: scale(0.85); filter: blur(15px); 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); text-align: center; 
        }
        .splash-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }
        .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }

        .row-container { scroll-behavior: smooth; }
        
        .movie-card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card-hover:hover { transform: scale(1.05) translateY(-5px); z-index: 40; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        
        /* Search Bar Animation */
        #searchContainer { transition: width 0.4s ease, opacity 0.4s ease; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // CONFIGS
        const firebaseConfig = {
            apiKey: "AIzaSyA3JgvNu5p-43037jvm4WRDaJHI9ES7uGM",
            authDomain: "levelup-ia.firebaseapp.com",
            projectId: "levelup-ia",
            storageBucket: "levelup-ia.firebasestorage.app",
            messagingSenderId: "229420004282",
            appId: "1:229420004282:web:6735f059a947f0936ae383",
            measurementId: "G-MSRDY2574K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_KEY = '027cc951d888c64e5f15dcb853c7347a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/original';

        // STATE GLOBAL
        window.currentLang = localStorage.getItem('levelmovie_lang') || 'fr';
        window.moviesMap = {}; 
        let currentHeroMovie = null;
        let currentCategory = 'home'; // home, tv, movie
        let searchTimeout = null;

        window.i18n = {
            fr: {
                appTitle: "Level Movie",
                enterKey: "Clé d'Accès requise",
                verifyKey: "Déverrouiller",
                home: "Accueil", series: "Séries", movies: "Films", myList: "Ma liste",
                trending: "Tendances Mondiales",
                freeVOD: "Films Gratuits (VOD Légale)",
                topRated: "Chefs-d'œuvre (Mieux Notés)",
                action: "Action & Adrénaline",
                comedy: "Comédies à mourir de rire",
                horror: "Frissons & Terreur",
                scifi: "Science-Fiction",
                animation: "Animation & Famille",
                docs: "Documentaires",
                play: "Lecture", details: "Plus d'infos",
                notFound: "Vidéo Non Disponible",
                notFoundDesc: "Le lecteur sécurisé n'a pas pu trouver le flux officiel pour ce titre."
            },
            en: {
                appTitle: "Level Movie",
                enterKey: "Access Key required",
                verifyKey: "Unlock",
                home: "Home", series: "TV Shows", movies: "Movies", myList: "My List",
                trending: "Global Trends",
                freeVOD: "Free Movies (Legal VOD)",
                topRated: "Masterpieces (Top Rated)",
                action: "Action & Adrenaline",
                comedy: "Hilarious Comedies",
                horror: "Thrills & Terror",
                scifi: "Sci-Fi",
                animation: "Animation & Family",
                docs: "Documentaries",
                play: "Play", details: "More Info",
                notFound: "Video Unavailable",
                notFoundDesc: "The secure player could not find the official stream for this title."
            }
        };

        // --- TOASTS ---
        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            let iconClass = type === 'error' ? 'fa-exclamation-triangle text-red-400' : type === 'success' ? 'fa-check-circle text-green-400' : 'fa-info-circle text-[#a855f7]';
            let colorClass = type === 'error' ? 'border-red-500/30 bg-[#0a0a0f]/95 text-red-50' : type === 'success' ? 'border-green-500/30 bg-[#0a0a0f]/95 text-green-50' : 'border-white/20 bg-[#0a0a0f]/95 text-white';
            
            toast.className = `flex items-center gap-4 p-4 rounded-2xl backdrop-blur-3xl border shadow-2xl transition-all duration-500 transform translate-x-full opacity-0 ${colorClass} min-w-[280px] pointer-events-auto mt-3`;
            toast.innerHTML = `<i class="fas ${iconClass} text-xl"></i><span class="text-[13px] font-bold tracking-wide">${msg}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0')));
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-10');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        };

        // --- LANG ---
        window.handleLangToggle = () => {
            window.currentLang = window.currentLang === 'fr' ? 'en' : 'fr';
            localStorage.setItem('levelmovie_lang', window.currentLang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.i18n[window.currentLang][key]) el.innerText = window.i18n[window.currentLang][key];
            });
            document.getElementById('authLangText').innerText = window.currentLang === 'fr' ? 'EN' : 'FR';
            document.getElementById('navLangText').innerText = window.currentLang === 'fr' ? 'EN' : 'FR';
            if(!document.getElementById('authPage').classList.contains('hidden')) return;
            fetchTMDBData();
        };

        // --- INIT ---
        signInAnonymously(auth).catch(()=>{});
        
        setTimeout(() => document.getElementById('splash1').classList.add('active'), 200);
        setTimeout(() => { document.getElementById('splash1').classList.remove('active'); document.getElementById('splash1').classList.add('exit'); }, 1200);
        setTimeout(() => document.getElementById('splash2').classList.add('active'), 1500);
        setTimeout(() => { document.getElementById('splash2').classList.remove('active'); document.getElementById('splash2').classList.add('exit'); }, 2800);

        setTimeout(() => {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splashScreen').classList.add('hidden');
                const savedKey = localStorage.getItem('levelmovie_saved_key');
                if (savedKey) {
                    const savedName = localStorage.getItem('levelmovie_user_name');
                    const savedPhoto = localStorage.getItem('levelmovie_user_photo');
                    setupUserProfile(savedName, savedPhoto);
                    launchApp();
                } else {
                    document.getElementById('authPage').classList.remove('hidden');
                }
                window.handleLangToggle(); // Trigger initial translations
                window.handleLangToggle(); // Toggle back to correct
            }, 500);
        }, 3200);

        function setupUserProfile(name, photoUrl) {
            document.getElementById('userNameDisplay').innerText = name || "Utilisateur";
            if (photoUrl && photoUrl !== 'null') {
                const img = document.getElementById('userAvatarImg');
                img.src = photoUrl;
                img.classList.remove('hidden');
                document.getElementById('userInitial').classList.add('hidden');
            } else {
                document.getElementById('userInitial').innerText = name ? name.charAt(0).toUpperCase() : 'U';
            }
        }

        // --- AUTH ---
        window.handleLogin = async () => {
            const key = document.getElementById('accessKeyInput').value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            if (!key) return;
            
            const btn = document.getElementById('verifyKeyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin text-xl"></i>`;
            
            try {
                const q = collectionGroup(db, 'security');
                const querySnapshot = await getDocs(q);
                let foundUserData = null;
                
                querySnapshot.forEach(docSnap => { if (docSnap.data().key === key) foundUserData = docSnap.data(); });
                
                if (foundUserData) {
                    const name = foundUserData.name || foundUserData.displayName || (foundUserData.owner ? foundUserData.owner.split('@')[0] : "Premium");
                    const photo = foundUserData.photoURL || foundUserData.picture || null;
                    
                    localStorage.setItem('levelmovie_saved_key', key);
                    localStorage.setItem('levelmovie_user_name', name);
                    localStorage.setItem('levelmovie_user_photo', photo);
                    
                    setupUserProfile(name, photo);
                    window.showToast(`Accès Autorisé, ${name}`, 'success');
                    document.getElementById('authPage').classList.add('hidden');
                    launchApp();
                } else {
                    window.showToast("Clé invalide ou expirée.", 'error');
                }
            } catch (error) {
                window.showToast("Erreur serveur.", 'error');
            }
            btn.innerHTML = originalText;
        };

        window.handleLogout = () => {
            localStorage.removeItem('levelmovie_saved_key');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('flex');
            document.getElementById('authPage').classList.remove('hidden');
        };

        // --- TMDB API ---
        const fetchJSON = async (url) => { const res = await fetch(url); return res.json(); };

        const buildRowHTML = (title, movies, isLarge, index) => {
            if(!movies || movies.length === 0) return '';
            const containerId = `row-scroll-${index}`;
            
            let moviesHtml = movies.map(movie => {
                if(!movie.poster_path || !movie.backdrop_path) return '';
                window.moviesMap[movie.id] = movie; 
                const imgClass = isLarge ? 'w-[160px] md:w-[220px] h-[240px] md:h-[330px]' : 'w-[220px] md:w-[280px] h-[124px] md:h-[157px]';
                const imgSrc = `${IMAGE_BASE_URL}${isLarge ? movie.poster_path : movie.backdrop_path}`;
                const titleStr = movie.title || movie.name || "";
                
                return `
                <div class="relative flex-none movie-card-hover cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520]" onclick="window.openVideoModal(${movie.id})">
                    <img class="object-cover ${imgClass} transition-opacity duration-500" src="${imgSrc}" loading="lazy" alt="Poster" onload="this.style.opacity=1" style="opacity:0"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                        <p class="text-white font-black text-xs md:text-sm uppercase tracking-wider truncate drop-shadow-md">${titleStr}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-[#a855f7] font-bold text-[10px]"><i class="fas fa-star"></i> ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="group relative ml-6 md:ml-12 animate-in fade-in duration-700">
                <h2 class="text-white/90 text-sm md:text-lg font-black mb-5 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-4 drop-shadow-sm flex items-center gap-3">
                    ${title} <i class="fas fa-chevron-right text-[10px] text-white/30"></i>
                </h2>
                <div onclick="document.getElementById('${containerId}').scrollBy({left: -600, behavior: 'smooth'})" class="absolute left-0 top-14 bottom-0 z-40 w-12 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent opacity-0 group-hover:opacity-100 flex items-center justify-start cursor-pointer transition-opacity duration-300 -ml-6 md:-ml-12">
                    <i class="fas fa-chevron-left text-white hover:text-[#a855f7] transition-colors text-3xl ml-2 drop-shadow-lg"></i>
                </div>
                <div id="${containerId}" class="flex overflow-y-hidden overflow-x-scroll py-4 space-x-5 no-scrollbar pr-12 row-container">
                    ${moviesHtml}
                </div>
                <div onclick="document.getElementById('${containerId}').scrollBy({left: 600, behavior: 'smooth'})" class="absolute right-0 top-14 bottom-0 z-40 w-16 bg-gradient-to-l from-[#060608] via-[#060608]/80 to-transparent opacity-0 group-hover:opacity-100 flex items-center justify-end cursor-pointer transition-opacity duration-300">
                    <i class="fas fa-chevron-right text-white hover:text-[#a855f7] transition-colors text-3xl mr-4 drop-shadow-lg"></i>
                </div>
            </div>`;
        };

        const launchApp = () => {
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('flex');
            fetchTMDBData();
        };

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.getElementById('searchInput').value = '';
            document.getElementById('searchTitleContainer').classList.add('hidden');
            document.getElementById('heroBanner').style.display = 'block';
            
            // UI Active state
            ['nav-home', 'nav-tv', 'nav-movie'].forEach(id => {
                document.getElementById(id).classList.remove('text-[#a855f7]');
                document.getElementById(id).classList.add('text-white');
            });
            if(cat !== 'home') {
                document.getElementById(`nav-${cat}`).classList.remove('text-white');
                document.getElementById(`nav-${cat}`).classList.add('text-[#a855f7]');
            }
            
            fetchTMDBData();
        };

        // --- SEARCH ---
        window.toggleSearch = () => {
            const container = document.getElementById('searchContainer');
            const input = document.getElementById('searchInput');
            if (container.classList.contains('w-0')) {
                container.classList.remove('w-0', 'opacity-0');
                container.classList.add('w-auto', 'opacity-100', 'mr-3');
                input.focus();
            } else {
                container.classList.add('w-0', 'opacity-0');
                container.classList.remove('w-auto', 'opacity-100', 'mr-3');
                if(input.value.trim() !== '') {
                    input.value = '';
                    window.setCategory('home');
                }
            }
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query === '') {
                document.getElementById('searchTitleContainer').classList.add('hidden');
                document.getElementById('heroBanner').style.display = 'block';
                fetchTMDBData();
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const langCode = window.currentLang === 'fr' ? 'fr-FR' : 'en-US';
                try {
                    const data = await fetchJSON(`${BASE_URL}/search/multi?api_key=${API_KEY}&language=${langCode}&query=${encodeURIComponent(query)}`);
                    const movies = data.results.filter(m => m.media_type === 'movie' || m.media_type === 'tv');
                    
                    document.getElementById('heroBanner').style.display = 'none';
                    document.getElementById('searchTitleContainer').classList.remove('hidden');
                    
                    const html = buildRowHTML(`Résultats pour "${query}"`, movies, false, 'search');
                    document.getElementById('rowsContainer').innerHTML = html || `<p class="text-white/50 text-center py-10">Aucun résultat trouvé.</p>`;
                } catch(e) {}
            }, 500);
        });

        // --- FETCH LOGIC ---
        window.fetchTMDBData = async () => {
            const langCode = window.currentLang === 'fr' ? 'fr-FR' : 'en-US';
            const t = window.i18n[window.currentLang];
            const container = document.getElementById('rowsContainer');
            container.innerHTML = `<div class="flex justify-center py-20"><i class="fas fa-spinner fa-spin text-4xl text-[#a855f7]"></i></div>`;
            
            try {
                let typePrefix = currentCategory === 'tv' ? '/tv' : '/movie';
                let discoverPrefix = currentCategory === 'tv' ? '/discover/tv' : '/discover/movie';
                if (currentCategory === 'home') { typePrefix = '/movie'; discoverPrefix = '/discover/movie'; }

                // Hero
                const trendUrl = currentCategory === 'home' ? `/trending/all/week` : `${typePrefix}/popular`;
                const trendData = await fetchJSON(`${BASE_URL}${trendUrl}?api_key=${API_KEY}&language=${langCode}`);
                
                const validTrend = trendData.results.filter(m => m.backdrop_path);
                currentHeroMovie = validTrend[Math.floor(Math.random() * validTrend.length)];
                
                if (currentHeroMovie) {
                    window.moviesMap[currentHeroMovie.id] = currentHeroMovie;
                    const header = document.getElementById('heroBanner');
                    header.style.backgroundImage = `url("${IMAGE_BASE_URL}${currentHeroMovie.backdrop_path}")`;
                    document.getElementById('heroTitle').innerText = currentHeroMovie.title || currentHeroMovie.name;
                    
                    let desc = currentHeroMovie.overview;
                    if(desc && desc.length > 250) desc = desc.substring(0, 249) + "...";
                    document.getElementById('heroDesc').innerText = desc || "Aucune description.";
                    
                    const meta = document.getElementById('heroMeta');
                    meta.innerHTML = `
                        <span class="text-green-400 border border-green-400/30 bg-green-400/10 px-2 py-0.5 rounded">98% Match</span>
                        <span>${(currentHeroMovie.release_date || currentHeroMovie.first_air_date || '').substring(0,4)}</span>
                        <span><i class="fas fa-star text-[#a855f7]"></i> ${currentHeroMovie.vote_average?.toFixed(1)}</span>
                    `;
                    document.getElementById('heroButtons').style.display = 'flex';
                }

                // Configuration des rangées massives (1000+ films possibles via API)
                let rowsConfig = [];
                
                if (currentCategory === 'home' || currentCategory === 'movie') {
                    rowsConfig.push(
                        { title: t.trending, url: `/trending/movie/week?api_key=${API_KEY}&language=${langCode}`, large: true },
                        { title: t.freeVOD, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_watch_monetization_types=free&watch_region=FR&sort_by=popularity.desc`, large: false },
                        { title: t.topRated, url: `/movie/top_rated?api_key=${API_KEY}&language=${langCode}`, large: false },
                        { title: t.action, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=28`, large: false },
                        { title: t.scifi, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=878`, large: false },
                        { title: t.comedy, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=35`, large: false },
                        { title: t.horror, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=27`, large: false },
                        { title: t.animation, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=16`, large: false },
                        { title: t.docs, url: `/discover/movie?api_key=${API_KEY}&language=${langCode}&with_genres=99`, large: false }
                    );
                } else if (currentCategory === 'tv') {
                    rowsConfig.push(
                        { title: "Séries Tendances", url: `/trending/tv/week?api_key=${API_KEY}&language=${langCode}`, large: true },
                        { title: "Les Mieux Notées", url: `/tv/top_rated?api_key=${API_KEY}&language=${langCode}`, large: false },
                        { title: "Action & Aventure", url: `/discover/tv?api_key=${API_KEY}&language=${langCode}&with_genres=10759`, large: false },
                        { title: "Animation", url: `/discover/tv?api_key=${API_KEY}&language=${langCode}&with_genres=16`, large: false },
                        { title: "Comédies", url: `/discover/tv?api_key=${API_KEY}&language=${langCode}&with_genres=35`, large: false },
                        { title: "Crime & Enquête", url: `/discover/tv?api_key=${API_KEY}&language=${langCode}&with_genres=80`, large: false }
                    );
                }

                // Fetch concurrent pour plus de vitesse
                const promises = rowsConfig.map(conf => fetchJSON(`${BASE_URL}${conf.url}`));
                const results = await Promise.all(promises);

                let allRowsHtml = "";
                results.forEach((data, index) => {
                    allRowsHtml += buildRowHTML(rowsConfig[index].title, data.results, rowsConfig[index].large, index);
                });
                container.innerHTML = allRowsHtml;

            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center">Erreur de chargement du catalogue.</p>`;
            }
        };

        // --- VIDEO MODAL ---
        window.playHeroMovie = () => {
            if(currentHeroMovie) window.openVideoModal(currentHeroMovie.id);
        };

        window.openVideoModal = async (movieId) => {
            const movie = window.moviesMap[movieId];
            if (!movie) return;

            const isTV = movie.first_air_date !== undefined;
            const typeStr = isTV ? 'tv' : 'movie';
            const langCode = window.currentLang === 'fr' ? 'fr-FR' : 'en-US';

            document.getElementById('modalMovieTitle').innerText = movie.title || movie.name || movie.original_name;
            document.getElementById('modalMovieYear').innerText = (movie.release_date || movie.first_air_date || '').substring(0, 4);
            document.getElementById('modalMovieDesc').innerText = movie.overview || window.i18n[window.currentLang].noDesc;
            
            const vContainer = document.getElementById('videoContainer');
            vContainer.innerHTML = `
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-circle-notch fa-spin text-5xl text-[#a855f7]"></i>
                </div>`;
            document.getElementById('videoModal').classList.remove('hidden');

            try {
                // Fetch Details (Cast, Genres)
                const detailsData = await fetchJSON(`${BASE_URL}/${typeStr}/${movieId}?api_key=${API_KEY}&language=${langCode}&append_to_response=credits`);
                
                if(detailsData.genres && detailsData.genres.length > 0) {
                    document.getElementById('modalMovieGenre').innerText = detailsData.genres.map(g => g.name).join(' • ');
                }
                
                if(detailsData.credits && detailsData.credits.cast) {
                    const castStr = detailsData.credits.cast.slice(0, 4).map(c => c.name).join(', ');
                    document.getElementById('modalMovieCast').innerText = castStr + "...";
                }

                if(detailsData.production_companies && detailsData.production_companies.length > 0) {
                    document.getElementById('modalMovieProd').innerText = detailsData.production_companies[0].name;
                }

                // Fetch Video
                let url = `${BASE_URL}/${typeStr}/${movie.id}/videos?api_key=${API_KEY}&language=${langCode}`;
                let res = await fetchJSON(url);
                
                if (!res.results || res.results.length === 0) {
                    url = `${BASE_URL}/${typeStr}/${movie.id}/videos?api_key=${API_KEY}&language=en-US`;
                    res = await fetchJSON(url);
                }

                let trailerKey = '';
                if (res.results && res.results.length > 0) {
                    // Priorité aux vidéos "Full Movie" sur youtube s'il y en a, sinon Trailer.
                    const full = res.results.find(v => v.type === 'Feature Film' && v.site === 'YouTube');
                    const trailer = res.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || res.results.find(v=>v.site==='YouTube');
                    trailerKey = full ? full.key : (trailer ? trailer.key : '');
                }

                if (trailerKey) {
                    vContainer.innerHTML = `
                        <iframe
                            class="absolute inset-0 w-full h-full"
                            src="https://www.youtube.com/embed/${trailerKey}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3"
                            frameBorder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowFullScreen
                        ></iframe>`;
                } else {
                    const t = window.i18n[window.currentLang];
                    vContainer.innerHTML = `
                        <div class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-t from-[#15092a] to-black p-8 text-center border-t border-[#a855f7]/20">
                            <i class="fas fa-video-slash text-6xl text-white/10 mb-6"></i>
                            <h3 class="text-2xl font-black mb-3 text-white uppercase tracking-widest drop-shadow-md">${t.notFound}</h3>
                            <p class="text-white/60 text-sm max-w-md">${t.notFoundDesc}</p>
                            <button onclick="window.showToast('Recherche de sources alternatives...', 'info')" class="mt-6 px-6 py-2 bg-white/5 border border-white/10 rounded-full text-xs font-bold text-white/70 hover:text-white transition-colors"><i class="fas fa-search mr-2"></i> Chercher sur le Web</button>
                        </div>`;
                }
            } catch (e) {
                vContainer.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center text-red-400 bg-black"><i class="fas fa-exclamation-triangle text-3xl mb-4"></i> Erreur de connexion aux serveurs sécurisés</div>`;
            }
        };

        window.closeVideoModal = () => {
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('videoContainer').innerHTML = ''; 
        };

    </script>
</body>
</html>
