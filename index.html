<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LevelGame - Cloud Gaming</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
  }
}
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-dark: #030303;
        --xbox-green: #107C10;
        --neon-green: #00FF41;
        --surface: #0f0f11;
        --border: rgba(255, 255, 255, 0.05);
    }
    
    * { 
        scrollbar-width: none; 
        -ms-overflow-style: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { display: none; }
    
    body {
        font-family: 'Rajdhani', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        margin: 0;
        overflow: hidden;
    }

    .cloud-card {
        background: linear-gradient(180deg, var(--surface) 0%, #050505 100%);
        border: 1px solid var(--border);
        transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .cloud-card:hover {
        border-color: var(--neon-green);
        box-shadow: 0 10px 30px rgba(0, 255, 65, 0.15);
        transform: translateY(-5px);
    }

    .neon-text {
        text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }

    .main-content {
        height: 100vh;
        overflow-y: auto;
        padding-bottom: 120px;
    }

    .game-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: black;
    }
    
    /* Loading Animation Cloud */
    .loader-pulse {
        animation: pulse-glow 1.5s infinite;
    }
    @keyframes pulse-glow {
        0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.4); }
        70% { box-shadow: 0 0 0 20px rgba(0, 255, 65, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
    }
</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Home, Search, Play, X, LogOut, Gamepad2, 
            MonitorPlay, Trophy, Zap, Shield, AlertCircle
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collectionGroup, getDocs } from 'firebase/firestore';

        // --- Configuration Firebase ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyA3JgvNu5p-43037jvm4WRDaJHI9ES7uGM",
            authDomain: "levelup-ia.firebaseapp.com",
            projectId: "levelup-ia",
            storageBucket: "levelup-ia.firebasestorage.app",
            messagingSenderId: "229420004282",
            appId: "1:229420004282:web:6735f059a947f0936ae383"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Jeux 100% jouables, sans création de compte obligatoire
        const CLOUD_GAMES = [
            { id: 'retro-bowl', title: 'Retro Bowl', genre: 'Sport / NFL', url: 'https://game316009.konggames.com/gamez/0031/6009/live/index.html', image: 'https://images.crazygames.com/retro-bowl/20210816155956/retro-bowl-cover?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: 'smash-karts', title: 'Smash Karts', genre: 'Action / Course', url: 'https://www.crazygames.com/embed/smash-karts', image: 'https://images.crazygames.com/games/smash-karts/cover-1583232506304.png?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: 'subway-surfers', title: 'Subway Surfers', genre: 'Endless Runner', url: 'https://unblocked-games.s3.amazonaws.com/subway-surfers.html', image: 'https://images.crazygames.com/games/subway-surfer/cover-1662991012648.png?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: 'moto-x3m', title: 'Moto X3M', genre: 'Course', url: 'https://www.crazygames.com/embed/moto-x3m', image: 'https://images.crazygames.com/games/moto-x3m/cover-1539958618776.jpg?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: 'shellshockers', title: 'Shell Shockers', genre: 'FPS', url: 'https://www.crazygames.com/embed/shellshockersio', image: 'https://images.crazygames.com/games/shellshockersio/cover-1593433502846.png?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: '2048', title: '2048 Classic', genre: 'Réflexion', url: 'https://play2048.co/', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/2048_logo.svg/512px-2048_logo.svg.png' },
            { id: '1v1-lol', title: '1v1.LOL', genre: 'Battle Royale', url: 'https://www.crazygames.com/embed/1v1-lol', image: 'https://images.crazygames.com/games/1v1-lol/cover-1604397529437.png?auto=format,compress&q=75&cs=strip&ch=DPR&w=600&h=338&fit=crop' },
            { id: 'hextris', title: 'Hextris', genre: 'Arcade', url: 'https://hextris.io/', image: 'https://hextris.io/images/icons/apple-touch-icon-114x114.png' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [accessKey, setAccessKey] = useState('');
            const [isInitializing, setIsInitializing] = useState(true);
            const [authError, setAuthError] = useState('');
            const [isLoadingAuth, setIsLoadingAuth] = useState(false);
            
            // Modales Cloud
            const [activeGame, setActiveGame] = useState(null);
            const [isServerLoading, setIsServerLoading] = useState(false);

            // 1. Authentification
            useEffect(() => {
                const initSecureSession = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token).catch(console.warn);
                        } else {
                            await signInAnonymously(auth).catch(console.warn);
                        }
                        
                        const savedKey = localStorage.getItem('lm_key');
                        const savedUid = localStorage.getItem('lm_uid');
                        const savedName = localStorage.getItem('lm_name');
                        
                        if (savedKey && savedUid) {
                            setUser({ uid: savedUid });
                            setUserName(savedName || 'Gamer VIP');
                        }
                    } catch (e) {
                        console.warn("Erreur d'initialisation:", e);
                    } finally {
                        setIsInitializing(false);
                    }
                };
                initSecureSession();
            }, []);

            const handleLogin = async () => {
                if (!accessKey.trim()) return;
                setIsLoadingAuth(true);
                setAuthError('');
                try {
                    const snap = await getDocs(collectionGroup(db, 'security'));
                    let validUser = null;
                    snap.forEach(d => { if (d.data().key === accessKey) validUser = d.data(); });

                    if (validUser) {
                        const uid = validUser.uid || auth.currentUser?.uid || Date.now().toString();
                        const name = validUser.name || validUser.displayName || "Gamer Premium";
                        setUser({ uid });
                        setUserName(name);
                        localStorage.setItem('lm_key', accessKey);
                        localStorage.setItem('lm_uid', uid);
                        localStorage.setItem('lm_name', name);
                    } else {
                        setAuthError("Clé invalide.");
                    }
                } catch (e) {
                    const uid = auth.currentUser?.uid || Date.now().toString();
                    setUser({ uid });
                    setUserName("Gamer VIP");
                    localStorage.setItem('lm_key', accessKey);
                    localStorage.setItem('lm_uid', uid);
                }
                setIsLoadingAuth(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('lm_key');
                localStorage.removeItem('lm_uid');
                localStorage.removeItem('lm_name');
                setUser(null);
            };

            // Lancement d'un jeu (Simulation de connexion au serveur Cloud)
            const launchGame = (game) => {
                setActiveGame(game);
                setIsServerLoading(true);
                // Simuler un temps de connexion au serveur pour masquer les chargements moches de l'iframe
                setTimeout(() => {
                    setIsServerLoading(false);
                }, 2500);
            };

            if (isInitializing) return (
                <div className="h-screen flex items-center justify-center bg-[#030303]">
                    <div className="flex flex-col items-center">
                        <div className="w-16 h-16 border-4 border-[#00FF41] border-t-transparent rounded-full animate-spin mb-4"></div>
                        <span className="font-bold tracking-widest text-[#00FF41] animate-pulse">CONNEXION AU CLOUD...</span>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="flex items-center justify-center h-screen px-4 bg-[#030303] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#107C10]/20 via-[#030303] to-[#030303]">
                    <div className="cloud-card w-full max-w-md p-10 rounded-[2rem] flex flex-col items-center text-center shadow-[0_0_50px_rgba(16,124,16,0.3)]">
                        <div className="w-20 h-20 bg-[#00FF41]/10 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(0,255,65,0.2)]">
                            <Gamepad2 className="w-10 h-10 text-[#00FF41]" />
                        </div>
                        <h1 className="text-4xl font-black tracking-tight mb-2 uppercase">Level<span className="text-[#00FF41]">Game</span></h1>
                        <p className="text-white/50 text-sm mb-10 font-bold uppercase tracking-widest">Cloud Gaming System</p>
                        
                        <div className="w-full space-y-4">
                            <input 
                                className="w-full bg-black border border-white/10 rounded-xl p-4 text-center text-lg tracking-widest outline-none focus:border-[#00FF41] transition-all font-mono uppercase"
                                placeholder="CLÉ D'ACCÈS"
                                value={accessKey}
                                onChange={e => setAccessKey(e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '').substring(0, 16))}
                                onKeyDown={e => e.key === 'Enter' && handleLogin()}
                            />
                            <button onClick={handleLogin} disabled={isLoadingAuth} className="w-full bg-[#00FF41] text-black py-4 rounded-xl font-black text-lg uppercase tracking-widest hover:bg-white transition-colors disabled:opacity-50 outline-none">
                                {isLoadingAuth ? 'Vérification...' : 'Jouer'}
                            </button>
                            {authError && <p className="text-xs text-red-500 font-bold mt-2 bg-red-500/10 py-2 rounded">{authError}</p>}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#030303]">
                    
                    {/* SIDEBAR PC */}
                    <aside className="w-64 bg-[#0a0a0a] border-r border-white/5 flex flex-col hidden md:flex z-40">
                        <div className="p-8">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-[#00FF41]/10 rounded-xl flex items-center justify-center border border-[#00FF41]/30">
                                    <Gamepad2 className="text-[#00FF41] w-6 h-6" />
                                </div>
                                <span className="font-black text-2xl tracking-tighter uppercase">Level<span className="text-[#00FF41]">Game</span></span>
                            </div>
                            <nav className="space-y-4">
                                <button className="flex items-center gap-4 text-[#00FF41] font-bold text-lg tracking-wider w-full text-left bg-[#00FF41]/10 px-4 py-3 rounded-xl border border-[#00FF41]/30 outline-none">
                                    <MonitorPlay size={20} /> Cloud Play
                                </button>
                            </nav>
                        </div>
                        <div className="mt-auto p-6">
                            <div className="bg-black border border-white/10 rounded-2xl p-4 flex items-center gap-3 cursor-pointer hover:border-red-500/50 transition-colors" onClick={handleLogout}>
                                <div className="w-10 h-10 rounded-full bg-[#00FF41]/20 flex items-center justify-center text-[#00FF41] font-bold border border-[#00FF41]/30">{userName.charAt(0)}</div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-bold truncate text-white">{userName}</p>
                                    <p className="text-[10px] text-[#00FF41] font-black uppercase tracking-widest truncate">Connecté</p>
                                </div>
                                <LogOut size={16} className="text-white/30" />
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto relative p-6 md:p-12 z-10 scroll-smooth">
                        
                        {/* Header Mobile */}
                        <div className="md:hidden flex items-center justify-between mb-8">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-[#00FF41]/10 rounded-lg flex items-center justify-center border border-[#00FF41]/30">
                                    <Gamepad2 className="text-[#00FF41] w-5 h-5" />
                                </div>
                                <span className="font-black text-xl tracking-tighter uppercase">Level<span className="text-[#00FF41]">Game</span></span>
                            </div>
                            <button onClick={handleLogout} className="p-2 bg-white/5 rounded-full"><LogOut size={16}/></button>
                        </div>

                        <div className="max-w-[1400px] mx-auto">
                            {/* Bannière Hero */}
                            <div className="relative h-[300px] md:h-[400px] rounded-3xl overflow-hidden mb-12 border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                <img src={CLOUD_GAMES[0].image} className="w-full h-full object-cover opacity-60" alt=""/>
                                <div className="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent"></div>
                                <div className="absolute inset-0 flex flex-col justify-center p-8 md:p-16">
                                    <div className="flex items-center gap-2 mb-4">
                                        <span className="bg-[#00FF41] text-black px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest">En Vedette</span>
                                    </div>
                                    <h2 className="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-6">{CLOUD_GAMES[0].title}</h2>
                                    <button onClick={() => launchGame(CLOUD_GAMES[0])} className="w-fit bg-[#00FF41] text-black px-8 py-4 rounded-xl font-black uppercase text-sm tracking-widest hover:bg-white transition-colors flex items-center gap-3 outline-none">
                                        <Play size={18} fill="black" /> Jouer Instantanément
                                    </button>
                                </div>
                            </div>

                            {/* Info de protection */}
                            <div className="bg-[#107C10]/10 border border-[#107C10]/30 rounded-xl p-4 mb-10 flex items-start gap-4">
                                <Shield className="w-6 h-6 text-[#00FF41] shrink-0" />
                                <div>
                                    <h4 className="text-[#00FF41] font-bold text-sm uppercase tracking-widest mb-1">Bouclier Cloud Activé</h4>
                                    <p className="text-white/60 text-xs">Les jeux sont exécutés dans un environnement sécurisé. Les pop-ups externes, publicités invasives et redirections sont bloqués par LevelUp.</p>
                                </div>
                            </div>

                            <h3 className="text-2xl font-black uppercase tracking-wider mb-6 flex items-center gap-3">
                                <MonitorPlay className="text-[#00FF41]" /> Tous les Jeux
                            </h3>

                            {/* Grille de jeux */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {CLOUD_GAMES.map((game) => (
                                    <div key={game.id} onClick={() => launchGame(game)} className="cloud-card rounded-2xl overflow-hidden cursor-pointer group">
                                        <div className="relative aspect-video">
                                            <img src={game.image} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt=""/>
                                            <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <div className="w-14 h-14 bg-[#00FF41] rounded-full flex items-center justify-center text-black shadow-[0_0_20px_#00FF41]">
                                                    <Play size={24} fill="black" className="ml-1" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-5">
                                            <h4 className="font-black text-lg uppercase tracking-wide truncate mb-1">{game.title}</h4>
                                            <p className="text-[11px] text-[#00FF41] font-bold uppercase tracking-widest">{game.genre}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* --- LECTEUR CLOUD GAMING (FULLSCREEN) --- */}
                    {activeGame && (
                        <div className="fixed inset-0 z-[9999] bg-black flex flex-col animate-in zoom-in-95 duration-300">
                            {/* Barre du haut */}
                            <div className="h-16 bg-[#0a0a0a] border-b border-white/10 flex items-center justify-between px-6 z-50">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded bg-[#00FF41]/10 flex items-center justify-center border border-[#00FF41]/30">
                                        <Gamepad2 size={20} className="text-[#00FF41]" />
                                    </div>
                                    <div>
                                        <span className="font-black text-lg tracking-widest uppercase text-white block leading-none">{activeGame.title}</span>
                                        <span className="text-[10px] text-[#00FF41] font-bold uppercase tracking-widest">LevelGame Server</span>
                                    </div>
                                </div>
                                <button onClick={() => {setActiveGame(null); setIsServerLoading(false);}} className="px-4 py-2 bg-red-500/10 text-red-500 border border-red-500/30 rounded font-bold text-xs uppercase hover:bg-red-500 hover:text-white transition-colors flex items-center gap-2 outline-none">
                                    <X size={16} /> Quitter le jeu
                                </button>
                            </div>

                            <div className="flex-1 w-full bg-black relative">
                                {/* Écran de chargement Cloud (Masque les chargements du jeu) */}
                                {isServerLoading && (
                                    <div className="absolute inset-0 bg-[#050505] z-40 flex flex-col items-center justify-center">
                                        <div className="relative mb-8">
                                            <div className="w-24 h-24 rounded-full border-2 border-white/10 flex items-center justify-center">
                                                <Zap className="w-10 h-10 text-[#00FF41]" />
                                            </div>
                                            <div className="absolute inset-0 rounded-full border-t-2 border-[#00FF41] animate-spin"></div>
                                            <div className="absolute inset-0 rounded-full loader-pulse"></div>
                                        </div>
                                        <h2 className="text-white font-black text-2xl tracking-widest uppercase mb-2">Connexion au Cloud</h2>
                                        <p className="text-white/40 text-sm font-mono uppercase">Chargement de {activeGame.title}...</p>
                                    </div>
                                )}

                                {/* Le Jeu en lui-même avec Sandbox stricte ! */}
                                {/* sandbox="allow-scripts allow-same-origin" bloque les popups, l'ouverture d'onglets et les redirections !! */}
                                <iframe 
                                    src={activeGame.url} 
                                    className="game-iframe"
                                    allow="autoplay; fullscreen; gamepad; focus-without-user-activation *;" 
                                    sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"
                                    allowFullScreen
                                ></iframe>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
